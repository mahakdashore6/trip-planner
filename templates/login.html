<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trip Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Part 1: Floating Animation for Background Elements */
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* High Quality Nature Background */
        .bg-img {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(255,255,255,0.1), rgba(0,0,0,0.1)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Floating Feathers/Petals Container */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            display: block;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50% 0 50% 50%; /* Leaf/Feather shape */
            animation: float 10s infinite ease-in;
            bottom: -10%;
        }

        /* Card Design */
        .login-wrapper {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 400;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: #333;
            margin: auto;
        }

        h2 { 
            font-weight: 600; 
            margin-bottom: 30px; 
            color: #2d5a27; /* Natural Green Color */
            letter-spacing: 1px;
        }

        .input-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-box:focus {
            background: white;
            border-color: #78c850;
            box-shadow: 0 0 10px rgba(120, 200, 80, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #78c850;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(120, 200, 80, 0.3);
        }

        .login-btn:hover {
            background: #5ea33c;
            transform: translateY(-2px);
        }

        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #2d5a27; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

    <div class="bg-img"></div>

    <div class="particles">
        <div class="particle" style="left: 10%; width: 15px; height: 15px; animation-delay: 0s;"></div>
        <div class="particle" style="left: 30%; width: 10px; height: 10px; animation-delay: 2s;"></div>
        <div class="particle" style="left: 50%; width: 20px; height: 20px; animation-delay: 4s;"></div>
        <div class="particle" style="left: 70%; width: 12px; height: 12px; animation-delay: 1s;"></div>
        <div class="particle" style="left: 90%; width: 18px; height: 18px; animation-delay: 6s;"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>Welcome Back 👋</h2>
            <form action="/login_logic" method="POST">
                <input type="email" name="email" class="input-box" placeholder="Email Address" required>
                <input type="password" name="password" class="input-box" placeholder="Password" required>
                <button type="submit" class="login-btn">Login Now</button>
            </form>
            <div class="links">
                <a href="/">Back to Home</a> | <a href="/register_page">Naya account?</a>
            </div>
        </div>
    </div>

</body>
</html>
