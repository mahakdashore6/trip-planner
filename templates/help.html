<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - Trip Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .help-container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 40px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.25); width: 90%; max-width: 700px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .help-header h1 { font-size: 32px; color: #00d2ff; }
        .faq-item { background: rgba(0, 0, 0, 0.25); padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 5px solid #00d2ff; }
        .faq-item h3 { margin: 0 0 5px 0; color: #78c850; }
        .faq-item p { margin: 0; font-size: 14px; opacity: 0.9; }
        .btn-back { display: block; width: fit-content; margin: 30px auto 0; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; text-decoration: none; padding: 12px 35px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
<div class="help-container">
    <div class="help-header">
        <h1>Kaise Help Kar Sakte Hain? 🆘</h1>
        <p>Aapki trip planning ko aasaan banane ke liye guide</p>
    </div>
    <div class="faq-item">
        <h3>Nayi Trip Kaise Add Karein? 📍</h3>
        <p>Dashboard par 'Create Trip' form bharein.</p>
    </div>
    <div class="faq-item">
        <h3>Kharcha Track Karein 💸</h3>
        <p>Trip card mein Expense section mein amount add karein.</p>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn-back">BACK TO DASHBOARD</a>
</div>
</body>
</html>
