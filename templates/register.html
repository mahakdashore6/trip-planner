<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Trip Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Yahan aap apni pasand ki professional image link daal sakti hain */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            color: white;
        }

        h2 { 
            margin-bottom: 35px; 
            font-weight: 600; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #1cc88a;
            box-shadow: 0 0 10px rgba(28, 200, 138, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .reg-btn {
            width: 100%;
            padding: 15px;
            background: #1cc88a;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 605;
            font-size: 18px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(28, 200, 138, 0.4);
        }

        .reg-btn:hover { 
            background: #17a673; 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(28, 200, 138, 0.6);
        }

        .login-link {
            margin-top: 25px;
            font-size: 14px;
        }

        .login-link a {
            color: #1cc88a;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Join Us ✨</h2>
        <form action="/register_logic" method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Create Password" required>
            </div>
            <button type="submit" class="reg-btn">Create Account</button>
        </form>

        <div class="login-link">
            Pehle se account hai? <a href="/login">Login karein</a>
        </div>
    </div>

</body>
</html>
