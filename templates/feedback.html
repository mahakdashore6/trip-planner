<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Trip Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .feedback-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 { margin-bottom: 20px; font-weight: 600; }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: inherit;
            resize: none;
            margin-bottom: 20px;
            outline: none;
        }

        textarea::placeholder { color: rgba(255,255,255,0.7); }

        .btn-submit {
            background: #fbc02d;
            color: #333;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-size: 16px;
        }

        .btn-submit:hover { transform: scale(1.02); background: #f9a825; }

        .back-link {
            display: block;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="feedback-card">
    <h2>Share Your Experience ⭐</h2>
    <p>Aapko hamara Trip Planner kaisa laga? Humein batayein!</p>
    
    <form action="/dashboard"> <textarea rows="5" placeholder="Apna feedback yahan likhein..." required></textarea>
        
        <div style="margin-bottom: 20px;">
            <p>Rating:</p>
            <span style="font-size: 25px; cursor: pointer;">⭐ ⭐ ⭐ ⭐ ⭐</span>
        </div>

        <button type="submit" class="btn-submit">Submit Feedback</button>
    </form>

    <a href="/dashboard" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
