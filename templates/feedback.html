<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback ⭐⭐ - Trip Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?auto=format&fit=crop&w=1950&q=80'); background-size: cover; background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .feedback-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #fbc02d; }
        textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0, 0, 0, 0.2); color: white; resize: none; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        select { width: 100%; padding: 12px; border-radius: 12px; background: rgba(0, 0, 0, 0.3); color: white; margin-bottom: 25px; outline: none; }
        select option { background: #1e293b; color: white; }
        .btn-submit { background: #fbc02d; color: #333; border: none; padding: 14px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .back-link { display: block; margin-top: 25px; color: #00d2ff; text-decoration: none; }
    </style>
</head>
<body>
<div class="feedback-card">
    <h2>Share Your Experience ⭐</h2>
    <form action="{{ url_for('submit_feedback') }}" method="POST"> 
        <textarea name="comment" rows="5" placeholder="Apna feedback yahan likhein..." required></textarea>
        <select name="rating" required>
            <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
            <option value="4">⭐⭐⭐⭐ (Very Good)</option>
            <option value="3">⭐⭐⭐ (Average)</option>
        </select>
        <button type="submit" class="btn-submit">Submit Feedback</button>
    </form>
    <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
</div>
</body>
</html>
